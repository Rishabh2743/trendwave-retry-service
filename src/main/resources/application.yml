server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: trendwave-retry-service
  datasource:
    url: jdbc:h2:mem:retrydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

retry:
  max-attempts: 3
  default-delay-seconds: 10
  processors:
    PROC_A:
      timeout-retry-delay-seconds: 5
      max-retry-attempts: 3
      timeout-recovery-rate: 0.68
    PROC_B:
      timeout-retry-delay-seconds: 30
      max-retry-attempts: 2
      timeout-recovery-rate: 0.30
    PROC_C:
      timeout-retry-delay-seconds: 15
      max-retry-attempts: 3
      timeout-recovery-rate: 0.50

logging:
  level:
    com.trendwave: DEBUG
    org.springframework.web: INFO